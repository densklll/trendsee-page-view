name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: build Docker image ───────────────────────────────────────────
  backend:
    name: Backend — Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend

  # ─── Frontend: type-check + Vite build ────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (vue-tsc + vite)
        run: npm run build
        working-directory: frontend

  # ─── Stack smoke-test: docker compose up + /health ────────────────────────
  stack:
    name: Stack — compose up & health check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start db, redis, app
        run: docker compose up -d db redis app

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' trendsee-app-1 2>/dev/null || echo "starting")
            echo "[$i] status: $STATUS"
            [ "$STATUS" = "healthy" ] && exit 0
            sleep 5
          done
          docker compose logs app
          exit 1

      - name: GET /health
        run: curl -sf http://localhost:8000/health

      - name: Tear down
        if: always()
        run: docker compose down -v
